apiVersion: apps/v1
kind: Deployment
metadata:
  name: adele-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adele-web-ui
  template:
    metadata:
      labels:
        app: adele-web-ui
    spec:
      # Run non-root; fsGroup makes the emptyDir (for the per-pod JWT signing
      # key) writable by the pod user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: web-ui
          # Replace with the image you built and pushed (see deploy/k8s/README.md).
          # This is a PLACEHOLDER registry - never commit the real one.
          image: registry.example.com:5000/adele/adele-web-ui:REPLACE_ME
          imagePullPolicy: Always # mutable tag; re-pull on rollout
          ports:
            - containerPort: 9379
          env:
            - name: RUST_LOG
              value: info
            - name: ADELE_WEB_UI_ENABLED
              value: "true"
            - name: ADELE_WEB_UI_BIND_ADDRESS
              value: "0.0.0.0"
            - name: ADELE_WEB_UI_PORT
              value: "9379"
            # Browser Origin allowlist. `http://localhost:9379` / `127.0.0.1`
            # cover `kubectl port-forward svc/adele-web-ui 9379:9379` (same-origin
            # SPA). `https://adele-web-ui.example.com` is a PLACEHOLDER for the
            # ingress host - an overlay patches it (see ../overlays/example).
            # Add a Tailscale MagicDNS origin here too if you reach the service
            # over the tailnet without going through the ingress.
            #
            # This is one of the four coupled places the hostname appears; the
            # other three are in ingress.yaml, which lists them. Getting this one
            # wrong is the confusing failure: TLS and routing work, then the
            # browser is rejected on the Origin check. `just check-deploy`
            # asserts all four agree.
            - name: ADELE_WEB_UI_ALLOWED_ORIGINS
              value: "http://localhost:9379,http://127.0.0.1:9379,https://adele-web-ui.example.com"
            # Browser front-door login (POST /login, HTTP Basic). Reuses the same
            # shared password Secret as the daemon for a single credential.
            # Env-specific login username, sourced from a ConfigMap so it stays
            # OUT of the repo and a `kubectl apply` can't revert it to a committed
            # default. Create it once:
            #   kubectl -n <ns> create configmap adele-web-ui-config \
            #     --from-literal=login_username=<your-username>
            - name: ADELE_WEB_UI_LOGIN_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: adele-web-ui-config
                  key: login_username
            - name: ADELE_WEB_UI_LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: WS_LOGIN_PASSWORD
            # Back door -> the in-cluster daemon over WebSocket (`/login` auth).
            - name: ADELE_WEB_UI_DAEMON_TRANSPORT
              value: "ws"
            - name: ADELE_WEB_UI_DAEMON_WS_URL
              value: "ws://adele-daemon:11339/ws"
            - name: ADELE_WEB_UI_DAEMON_WS_USERNAME
              value: "adele"
            - name: ADELE_WEB_UI_DAEMON_WS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: adele-secrets
                  key: WS_LOGIN_PASSWORD
            # Stable HS256 signing key for the browser session tokens the BFF
            # mints, from a Secret - so a redeploy does NOT invalidate everyone's
            # login. (Without this, the key regenerates on the per-pod emptyDir
            # every deploy, stranding the SPA on an invalid token.) Create once:
            #   kubectl -n <ns> create secret generic adele-web-ui-jwt \
            #     --from-literal=ws_jwt_hs256_signing_key="$(openssl rand -hex 32)"
            - name: ADELE_WEB_UI_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: adele-web-ui-jwt
                  key: ws_jwt_hs256_signing_key
            # Browser token lifetime - 7 days. 15 min was too short and stranded
            # the SPA on expiry (it doesn't yet re-auth on 401 - tracked follow-up).
            - name: ADELE_WEB_UI_TOKEN_TTL_SECS
              value: "604800"
          volumeMounts:
            # Per-pod HS256 signing key for browser session tokens lives under
            # $XDG_DATA_HOME (/home/appuser/.local/share). An emptyDir keeps the
            # rootfs read-mostly and regenerates the key on restart (users just
            # re-login) - acceptable for this single-user LAN service. Swap for a
            # PVC if you want tokens to survive a pod restart.
            - name: data
              mountPath: /home/appuser/.local/share
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9379
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9379
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: adele-web-ui
spec:
  selector:
    app: adele-web-ui
  ports:
    - port: 9379
      targetPort: 9379
